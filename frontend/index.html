<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadFlow - Login</title>
    <link rel="stylesheet" href="./bootstrap/dist/css/bootstrap.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="auth-page min-vh-100 d-flex align-items-center py-4">
        <div class="auth-container">
            <div class="auth-card shadow-sm">
                <div class="text-center mb-4">
                    <img src="img/ReadFlow.png" alt="Logo do ReadFlow" width="140" height="140" class="img-fluid">
                    <h1 class="h3 mt-3 mb-0">Entrar</h1>
                    <p class="text-muted mb-0">Acesse sua conta para continuar</p>
                </div>

                <div id="feedbackArea" class="d-none mb-3" aria-live="polite" aria-atomic="true"></div>

                <form id="login-form" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email <span aria-hidden="true">*</span></label>
                        <input type="email" class="form-control" id="email" required aria-required="true">
                        <div class="invalid-feedback">Informe um email válido.</div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Senha <span aria-hidden="true">*</span></label>
                        <input type="password" class="form-control" id="password" required aria-required="true">
                        <div class="invalid-feedback">Informe sua senha.</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" id="login-btn">Entrar</button>
                </form>

                <p class="text-center mt-4 mb-0">
                    Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="./bootstrap/dist/js/bootstrap.bundle.js"></script>
</body>

</html>
